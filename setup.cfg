[flake8]
max-line-length = 100
extend-ignore = E501, E402
exclude =
    venv,
    venv-windows,
    venv-wsl,
    .git,
    __pycache__,
    .mypy_cache,
    agent.py.backup,
    agent.py.backup-health-insurance,
    agent.py.aggressive,
    outbound-caller-python,
    ai-assistant-calling-project-2

[mypy]
ignore_missing_imports = True
exclude = (venv|venv-windows|venv-wsl|outbound-caller-python|ai-assistant-calling-project-2|\.backup)
